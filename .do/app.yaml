name: llm-server
region: nyc
services:
  - name: llm-server
    source_dir: /
    github:
      repo: dluman/llm-server
      branch: main
      deploy_on_push: true
    build_command: pip install -r requirements.txt
    run_command: uvicorn app.main:app --host 0.0.0.0 --port 8080
    environment_slug: python
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    http_port: 8080
    health_check:
      http_path: /health
    envs:
      - key: ZEN_BASE_URL
        scope: RUN_TIME
        value: https://opencode.ai/zen
      - key: ZEN_AUTH_VERIFY_URL
        scope: RUN_TIME
        value: https://opencode.ai/zen/v1/models
      - key: ZEN_API_HEADER
        scope: RUN_TIME
        value: X-Zen-Api-Key
      - key: AUTH_CACHE_TTL_SECONDS
        scope: RUN_TIME
        value: "300"
      - key: AUTH_CACHE_MAX_SIZE
        scope: RUN_TIME
        value: "10000"
      - key: UPSTREAM_TIMEOUT_SECONDS
        scope: RUN_TIME
        value: "60"
      - key: LOG_LEVEL
        scope: RUN_TIME
        value: info
      - key: GITHUB_AUTH_ENABLED
        scope: RUN_TIME
        value: "true"
      - key: GITHUB_DEVICE_FLOW_ENABLED
        scope: RUN_TIME
        value: "true"
      - key: GITHUB_DIRECT_TOKEN_ENABLED
        scope: RUN_TIME
        value: "true"
      - key: GITHUB_SESSION_TTL_SECONDS
        scope: RUN_TIME
        value: "28800"
      - key: GITHUB_DEVICE_FLOW_SCOPES
        scope: RUN_TIME
        value: "read:org read:enterprise"
domains:
  - domain: llm.chompe.rs
    type: PRIMARY
features:
  - buildpack-stack=ubuntu-22
